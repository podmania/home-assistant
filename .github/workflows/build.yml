name: Build and push HAOS container images

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
            arch: x86_64
            tag_suffix: amd64
          # - platform: arm64
          #   runner: ubuntu-24.04-arm
          #   arch: aarch64
          #   tag_suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = kvm

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image for ${{ matrix.arch }}
        run: |
          nix build --extra-experimental-features flakes --impure .#haos-container-${{ matrix.arch }}
          docker load < result
          docker tag home-assistant-os:latest ghcr.io/${{ github.repository_owner }}/home-assistant-os:latest-${{ matrix.tag_suffix }}
          docker tag home-assistant-os:latest ghcr.io/${{ github.repository_owner }}/home-assistant-os:${{ github.sha }}-${{ matrix.tag_suffix }}

      - name: Push architecture-specific images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/home-assistant-os:latest-${{ matrix.tag_suffix }}
          docker push ghcr.io/${{ github.repository_owner }}/home-assistant-os:${{ github.sha }}-${{ matrix.tag_suffix }}

      - name: Debug build failure
        if: failure()
        run: |
          nix build --keep-failed --extra-experimental-features flakes --impure .#haos-container-x86_64
          echo "Build directory: $(find /tmp -name 'nix-build-*.drv-*' -type d | head -1)"
          
  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/home-assistant-os
          docker manifest create $IMAGE:latest \
            --amend $IMAGE:latest-amd64 \
            --amend $IMAGE:latest-arm64
          docker manifest push $IMAGE:latest

          docker manifest create $IMAGE:${{ github.sha }} \
            --amend $IMAGE:${{ github.sha }}-amd64 \
            --amend $IMAGE:${{ github.sha }}-arm64
          docker manifest push $IMAGE:${{ github.sha }}

          docker manifest create $IMAGE:stable \
            --amend $IMAGE:latest-amd64 \
            --amend $IMAGE:latest-arm64
          docker manifest push $IMAGE:stable

  create-release:
    needs: create-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract HAOS version from flake.nix
        id: version
        run: |
          # Extract version from the x86_64 URL (e.g., 17.3)
          VERSION=$(grep -oP 'haos_generic-x86-64-\K[0-9]+\.[0-9]+' flake.nix | head -1)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from flake.nix"
            exit 1
          fi
          echo "haos_version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Home Assistant OS ${{ steps.version.outputs.haos_version }}" \
            --notes "Container image for HAOS ${{ steps.version.outputs.haos_version }}

            Pull with:
            \`\`\`
            docker pull ghcr.io/${{ github.repository_owner }}/home-assistant-os:latest
            \`\`\`

            See [README](https://github.com/${{ github.repository }}#readme) for usage."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
