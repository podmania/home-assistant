name: Update HAOS version

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Get latest HAOS release
        id: release
        run: |
          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/home-assistant/operating-system/releases/latest")
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          URL_X86=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("haos_generic-x86-64-[0-9]+\\.[0-9]+\\.img\\.xz")) | .browser_download_url')
          URL_ARM=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("haos_generic-aarch64-[0-9]+\\.[0-9]+\\.qcow2\\.xz")) | .browser_download_url')
          echo "url_x86=$URL_X86" >> $GITHUB_OUTPUT
          echo "url_arm=$URL_ARM" >> $GITHUB_OUTPUT

      - name: Compute SRI hashes
        id: hashes
        run: |
          HASH_X86_B32=$(nix-prefetch-url --type sha256 "${{ steps.release.outputs.url_x86 }}" --name haos_x86.img.xz)
          HASH_ARM_B32=$(nix-prefetch-url --type sha256 "${{ steps.release.outputs.url_arm }}" --name haos_arm.qcow2.xz)
          SRI_X86=$(nix --extra-experimental-features flakes hash convert --hash-algo sha256 --to sri "$HASH_X86_B32")
          SRI_ARM=$(nix --extra-experimental-features flakes hash convert --hash-algo sha256 --to sri "$HASH_ARM_B32")
          echo "sri_x86=$SRI_X86" >> $GITHUB_OUTPUT
          echo "sri_arm=$SRI_ARM" >> $GITHUB_OUTPUT

      - name: Update flake.nix (x86_64)
        run: |
          sed -i "/haosImg_x86_64 =/,/^  ;/ {
            s|url = \".*\"|url = \"${{ steps.release.outputs.url_x86 }}\"|;
            s|hash = \"sha256-[^\"]*\"|hash = \"${{ steps.hashes.outputs.sri_x86 }}\"|
          }" flake.nix

      - name: Update flake.nix (aarch64)
        run: |
          sed -i "/haosXz_aarch64 =/,/^  ;/ {
            s|url = \".*\"|url = \"${{ steps.release.outputs.url_arm }}\"|;
            s|hash = \"sha256-[^\"]*\"|hash = \"${{ steps.hashes.outputs.sri_arm }}\"|
          }" flake.nix

      - name: Update flake.lock
        run: |
          nix --extra-experimental-features flakes flake lock

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: update HAOS to ${{ steps.release.outputs.version }}"
          git push origin main
          echo "committed=true" >> $GITHUB_OUTPUT
      
      - name: Trigger build workflow
        if: steps.commit.outputs.committed == 'true'
        run: |
          gh workflow run build.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
