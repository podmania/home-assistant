name: Update HAOS version

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Get latest HAOS release
        id: release
        run: |
          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/home-assistant/operating-system/releases/latest")
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          URL_X86=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("haos_generic-x86-64-[0-9]+\\.[0-9]+\\.img\\.xz")) | .browser_download_url')
          URL_ARM=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("haos_generic-aarch64-[0-9]+\\.[0-9]+\\.qcow2\\.xz")) | .browser_download_url')
          if [ -z "$URL_X86" ] || [ -z "$URL_ARM" ]; then
            echo "ERROR: Assets not found"
            exit 1
          fi
          echo "url_x86=$URL_X86" >> $GITHUB_OUTPUT
          echo "url_arm=$URL_ARM" >> $GITHUB_OUTPUT
      
      - name: Compute hashes
        id: hashes
        run: |
          HASH_X86=$(nix-prefetch-url --type sha256 "${{ steps.release.outputs.url_x86 }}" --name haos_x86.img.xz)
          HASH_ARM=$(nix-prefetch-url --type sha256 "${{ steps.release.outputs.url_arm }}" --name haos_arm.qcow2.xz)
          echo "base32_x86=sha256-$HASH_X86" >> $GITHUB_OUTPUT
          echo "base32_arm=sha256-$HASH_ARM" >> $GITHUB_OUTPUT

      - name: Update flake.nix
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          URL_X86="${{ steps.release.outputs.url_x86 }}"
          URL_ARM="${{ steps.release.outputs.url_arm }}"
          HASH_X86="${{ steps.hashes.outputs.sri_x86 }}"
          HASH_ARM="${{ steps.hashes.outputs.sri_arm }}"

          sed -i "/haosImg_x86_64 =/,/^  ;/ {
            s|url = \".*\"|url = \"$URL_X86\"|;
            s|hash = \"sha256-[^\"]*\"|hash = \"$HASH_X86\"|
          }" flake.nix
          
          sed -i "/haosXz_aarch64 =/,/^  ;/ {
            s|url = \".*\"|url = \"$URL_ARM\"|;
            s|hash = \"sha256-[^\"]*\"|hash = \"$HASH_ARM\"|
          }" flake.nix
          
      - name: Update flake.lock
        run: |
          nix --extra-experimental-features flakes flake lock

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update HAOS to ${{ steps.release.outputs.version }}"
          git push origin main

      - name: Trigger build workflow
        run: |
          gh workflow run build.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
